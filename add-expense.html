<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fam | Add Expense</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="styles.css" rel="stylesheet"/>
</head>
<body>
  <div class="app-layout" id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;color:var(--text-dim)">Loading...</div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="data.js"></script>
  <script>
    (async () => {
      if (!(await checkAuth())) return;
      const app = document.getElementById('app');
      const today = new Date().toISOString().split('T')[0];

      app.innerHTML = `
        ${buildSidebar('')}
        <main class="main-content">
          ${buildTopbar('Add Expense')}
          <div class="page-content" style="max-width:640px">
            <div class="page-header">
              <h1>Add Expense</h1>
              <a href="dashboard.html" class="btn btn-secondary btn-sm"><span class="material-symbols-outlined" style="font-size:14px">arrow_back</span> Back</a>
            </div>
            <div class="card">
              <form id="expense-form" novalidate>
                <div class="form-row">
                  <div class="form-group"><label class="form-label" for="amount">Amount *</label><input class="form-input" id="amount" type="number" step="0.01" min="0.01" placeholder="0.00" required/><div class="form-error" id="amount-error">Please enter a valid amount</div></div>
                  <div class="form-group"><label class="form-label" for="date">Date *</label><input class="form-input" id="date" type="date" value="${today}" required/><div class="form-error" id="date-error">Please select a date</div></div>
                </div>
                <div class="form-group"><label class="form-label" for="category">Category *</label><select class="form-select" id="category" required><option value="">Select a category</option>${FamData.EXPENSE_CATEGORIES.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select><div class="form-error" id="category-error">Please select a category</div></div>
                <div class="form-group"><label class="form-label" for="description">Description *</label><input class="form-input" id="description" type="text" placeholder="e.g. Grocery shopping at Whole Foods" required/><div class="form-error" id="desc-error">Please enter a description</div></div>
                <div class="form-group"><label class="form-label" for="notes">Notes (optional)</label><textarea class="form-input" id="notes" rows="3" placeholder="Additional details..." style="resize:vertical"></textarea></div>
                <div class="form-group" style="display:flex;align-items:center;justify-content:space-between">
                  <div><div style="font-size:14px;color:var(--text-primary);margin-bottom:2px">Recurring Expense</div><div style="font-size:12px;color:var(--text-dim)">This expense repeats monthly</div></div>
                  <label class="toggle"><input type="checkbox" id="recurring"/><span class="toggle-track"></span><span class="toggle-thumb"></span></label>
                </div>
                <div class="form-actions"><button type="submit" class="btn btn-primary" style="flex:1" id="save-btn">Save Expense</button><a href="dashboard.html" class="btn btn-secondary">Cancel</a></div>
              </form>
            </div>
          </div>
        </main>
      `;

      document.getElementById('expense-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.querySelectorAll('.form-error').forEach(el => el.classList.remove('visible'));
        document.querySelectorAll('.form-input,.form-select').forEach(el => el.classList.remove('error'));

        const amount = parseFloat(document.getElementById('amount').value);
        const date = document.getElementById('date').value;
        const category = document.getElementById('category').value;
        const description = document.getElementById('description').value.trim();
        const recurring = document.getElementById('recurring').checked;
        const notes = document.getElementById('notes').value.trim();

        let valid = true;
        if (!amount || amount <= 0) { document.getElementById('amount').classList.add('error'); document.getElementById('amount-error').classList.add('visible'); valid = false; }
        if (!date) { document.getElementById('date').classList.add('error'); document.getElementById('date-error').classList.add('visible'); valid = false; }
        if (!category) { document.getElementById('category').classList.add('error'); document.getElementById('category-error').classList.add('visible'); valid = false; }
        if (!description) { document.getElementById('description').classList.add('error'); document.getElementById('desc-error').classList.add('visible'); valid = false; }
        if (!valid) return;

        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.textContent = 'Saving...';
        await FamData.addTransaction({ type: 'expense', category, description, amount, date, recurring, notes });
        showToast('Expense added successfully');
        setTimeout(() => window.location.href = 'dashboard.html', 600);
      });

      document.querySelectorAll('#expense-form .form-input, #expense-form .form-select').forEach(el => {
        el.addEventListener('input', () => { el.classList.remove('error'); el.nextElementSibling && el.nextElementSibling.classList.remove('visible'); });
        el.addEventListener('change', () => { el.classList.remove('error'); });
      });
    })();
  </script>
</body>
</html>
